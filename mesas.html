<div class="modal fade" id="zoomModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-dark">
      
      <div class="modal-body p-0">

        <div id="zoomCarousel" class="carousel slide" data-bs-interval="false" data-bs-touch="true" data-bs-wrap="true">
            <div class="carousel-inner" id="carouselImages"></div>

            <button class="carousel-control-prev" type="button" data-bs-target="#zoomCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#zoomCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  const zoomCarousel = document.getElementById('zoomCarousel');
  let carouselInstance = null;

  document.querySelectorAll('.zoom-click').forEach(img => {
    img.addEventListener('click', function () {
      const images = this.dataset.images
        ? this.dataset.images.split(',').map(i => i.trim())
        : [this.src];

      const carouselInner = document.getElementById('carouselImages');
      carouselInner.innerHTML = '';

      images.forEach((src, index) => {
        carouselInner.innerHTML += `
          <div class="carousel-item ${index === 0 ? 'active' : ''}">
            <img src="${src}" class="d-block w-100 img-fluid zoom-slide" alt="Imagen del producto">
          </div>
        `;
      });

      if (carouselInstance) {
        carouselInstance.dispose();
      }

      carouselInstance = new bootstrap.Carousel(zoomCarousel, {
        interval: false,
        touch: true,
        wrap: true
      });
    });
  });
</script>
